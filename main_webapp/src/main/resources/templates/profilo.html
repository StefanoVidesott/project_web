<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>

    <div class="container p-5">
        <div class="row mb-3">
            <div class="col">
                <h1>Benvenuto/a, <span th:text="${name}"></span>!</h1>
                <p class="text-muted">Dashboard PRO</p>
            </div>
        </div>

        <div class="row mb-3">
            <div class="box p-4">
                <div class="row mb-4">
                    <div class="col">
                        <h2>Il tuo profilo</h2>
                    </div>
                </div>
                <div class="col">
                    <p><strong>Nome:</strong> <span th:text="${user.firstName}"></span></p>
                    <p><strong>Cognome:</strong> <span th:text="${user.lastName}"></span></p>
                    <p><strong>Data di nascita:</strong> <span th:text="${user.birthDate}"></span></p>
                    <p><strong>Ruolo:</strong> <span th:text="${user.authority}"></span></p>
                </div>
            </div>
        </div>

        <div class="row mb">
            <div class="col-auto">
                <a th:href="@{/dashboard}" class="btn btn-primary">
                    Torna alla Dashboard
                </a>
            </div>
        </div>
    </div>
    <div th:replace="~{bases/footer.html}"></div>
    <div th:replace="~{bases/scripts.html}"></div>
</body>
</html>
