<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>

    <div class="container p-5">
        <div class="row mb-4">
            <div class="col">
                <h1>Benvenuto/a, <span th:text="${name}"></span>!</h1>
                <p class="text-muted">Dashboard PROVA</p>
                <p>Allenamenti effettuati: <span th:text="${trainingsCount}"></span>/3</p>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-auto">
                <a th:href="@{/profilo}" class="btn btn-primary">
                    Visualizza Profilo
                </a>
            </div>
            <div class="col-auto">
                <a th:href="@{/cambioPassword}" class="btn btn-warning">
                    Cambia cambioPassword
                </a>
            </div>
            <div class="col-auto">
                <a th:href="@{/upgrade}" class="btn btn-secondary">
                    Effettua Upgrade
                </a>
            </div>
        </div>

        <div class="row mt-5">
            <div class="box">
                <h5 class="mb-3">Inserisci una Recensione</h5>
                <div id="reviewMsg"></div>
                <div class="mb-3">
                    <textarea id="reviewContent" class="form-control" rows="3" placeholder="Scrivi la tua Recensione..." maxlength="512"></textarea>
                </div>
                <button class="btn btn-primary mb-3" onclick="sendReview()">
                    Inserisci Recensione
                </button>
            </div>
        </div>
    </div>

    <div th:replace="~{bases/review.html}"></div>

    <footer th:replace="~{bases/footer.html}"></footer>
    <script th:replace="~{bases/scripts.html}"></script>
</body>
</html>
