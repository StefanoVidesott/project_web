<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>

    <div class="container p-5">
        <div class="row mb-4">
            <div class="col">
                <h1>Benvenuto/a, <span th:text="${name}"></span>!</h1>
                <p class="text-muted">Dashboard BASIC</p>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-auto">
                <a th:href="@{/profilo}" class="btn btn-primary">
                    Visualizza Profilo
                </a>
            </div>
            <div class="col-auto">
                <a th:href="@{/cambioPassword}" class="btn btn-warning">
                    Cambia cambioPassword
                </a>
            </div>
            <div class="col-auto">
                <a th:href="@{/upgrade}" class="btn btn-info">
                    Effettua Upgrade
                </a>
            </div>
            <div class="col-auto">
                <a th:href="@{/statistiche}" class="btn btn-secondary">
                    Visualizza Statistiche
                </a>
            </div>
        </div>

        <div th:replace="~{bases/review.html}"></div>
    </div>

    <footer th:replace="~{bases/footer.html}"></footer>
    <script th:replace="~{bases/scripts.html}"></script>
</body>
</html>
