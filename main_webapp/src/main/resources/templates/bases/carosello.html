<!-- References
    https://getbootstrap.com/docs/5.0/components/carousel/
-->

<div class="container mt-5">
    <h4 class="text-muted mb-3">Cosa dicono i nostri utenti</h4>
    <div id="carouselReviews" class="carousel slide" data-bs-ride="carousel" data-bs-interval="30000">
        <div class="box carousel-inner" id="reviewsSlidesContainer">
            <p id="getReviewEndpoint" th:text="@{/reviews}" style="display:none"></p>

            <div class="carousel-item active">
                <div class="p-4 text-center">
                    <p class="text-muted">Caricamento recensioni...</p>
                </div>
            </div>

        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselReviews" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselReviews" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</div>
