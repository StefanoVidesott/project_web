<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>
    <h1>Registrazione</h1>

    <!-- Error message -->
    <div th:if="${error}" style="color:red">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/addUser}" method="post" onsubmit="return validateForm()">

        <label>Nome</label><br>
        <input type="text" name="firstName" required><br><br>

        <label>Cognome</label><br>
        <input type="text" name="lastName" required><br><br>

        <label>Data di nascita (GG/MM/AAAA)</label><br>
        <input type="text" id="birthDateDisplay" placeholder="01/12/1999" required><br>
        <input type="hidden" id="birthDate" name="birthDate"><br>

        <label>Email</label><br>
        <input type="text" name="email" required><br><br>

        <label>Username</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password</label><br>
        <input type="password" id="password1" name="password" required><br><br>

        <label>Conferma password</label><br>
        <input type="password" id="password2" required><br><br>

        <label>Piano di allenamento</label><br>
        <select name="plan" required>
            <option value="">-- Seleziona --</option>
            <option value="ROLE_USER_PROVA">Prova (gratuito, 3 allenamenti)</option>
            <option value="ROLE_USER_BASIC">Basic (€9.90/mese)</option>
            <option value="ROLE_USER_PRO">Pro (€19.90/mese)</option>
        </select><br><br>

        <div id="errorMsg" style="color:red"></div>

        <button type="submit">Registrati</button>
        <button type="reset">Reset</button>
    </form>

<script>
    function validateForm() {
        const errorDiv = document.getElementById("errorMsg");
        errorDiv.textContent = "";

        // BirthDate validation GG/MM/AAAA
        const dateInput = document.getElementById("birthDateDisplay").value.trim();
        const dateRegex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
        const match = dateInput.match(dateRegex);
        if (!match) {
            errorDiv.textContent = "Formato data non valido. Usa GG/MM/AAAA.";
            return false;
        }

        const day   = parseInt(match[1]);
        const month = parseInt(match[2]);
        const year  = parseInt(match[3]);
        const birthDate = new Date(year, month - 1, day);

        if (birthDate.getFullYear() !== year ||
            birthDate.getMonth() !== month - 1 ||
            birthDate.getDate() !== day) {
            errorDiv.textContent = "Data di nascita non valida.";
            return false;
        }

        const today = new Date();
        const age18 = new Date(birthDate);
        age18.setFullYear(age18.getFullYear() + 18);
        if (age18 > today) {
            errorDiv.textContent = "Devi essere maggiorenne per registrarti.";
            return false;
        }

        // Convertto YYYY-MM-DD (Java compatible)
        const yyyy = year.toString().padStart(4, "0");
        const mm   = month.toString().padStart(2, "0");
        const dd   = day.toString().padStart(2, "0");
        document.getElementById("birthDate").value = yyyy + "-" + mm + "-" + dd;

        // Password validation
        const pwd1 = document.getElementById("password1").value;
        if (pwd1.length < 8) {
            errorDiv.textContent = "La password deve essere lunga almeno 8 caratteri.";
            return false;
        }
        if (!pwd1.includes("id_07")) {
            errorDiv.textContent = "La password deve contenere 'id_07'.";
            return false;
        }

        const pwd2 = document.getElementById("password2").value;
        if (pwd1 !== pwd2) {
            errorDiv.textContent = "Le due password non coincidono.";
            return false;
        }

        return true;
    }
</script>
</body>
</html>
