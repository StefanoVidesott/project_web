<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>
    <div class="container p-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center mb-5">
                <h1>GymBros Center</h1>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="box p-4 p-md-5">
                    <div class="row text-center mb-4">
                        <h2>Registrati</h2>
                    </div>
                    <!-- Error message -->
                    <div style="color:red">
                        <p id="errorMsg" th:text="${error}"><p>
                    </div>
                    <form class="login-form" th:action="@{/addUser}" method="post" onsubmit="return validateForm()">
                        <div class="row mb-3">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Nome" aria-label="Nome" name="firstName" required>
                            </div>
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Cognome" aria-label="Cognome" name="lastName" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <input type="text" id="birthDateDisplay" class="form-control" placeholder="Data di nascita (GG/MM/AAAA)" aria-label="Data di nascita (GG/MM/AAAA)" required>
                                <input type="hidden" id="birthDate" name="birthDate">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <input type="email" class="form-control" placeholder="Email" aria-label="Email" name="email" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <input type="text" class="form-control" placeholder="Username" aria-label="Username" name="username" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <input type="password" id="password1" class="form-control" placeholder="Password" aria-label="Password" name="password" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <input type="password" id="password2" class="form-control" placeholder="Conferma Password" aria-label="Conferma Password" required>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <select class="form-select" place name="plan" required>
                                    <option selected value="">Seleziona</option>
                                    <option value="ROLE_USER_PROVA">Prova (gratuito, 3 allenamenti)</option>
                                    <option value="ROLE_USER_BASIC">Basic (€9.99/mese)</option>
                                    <option value="ROLE_USER_PRO">Pro (€14.90/mese)</option>
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <button class="form-control btn btn-primary" type="submit">Registrati</button>
                            </div>
                            <div class="col">
                                <button class="form-control btn btn-danger" type="reset">Reset</button>
                            </div>
                        </div>
                    </form>
                    <div class="text-center">
                        <p>Già uno di noi? <a th:href="@{/login}">Accedi</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script>
    function validateForm() {
        const errorDiv = document.getElementById("errorMsg");
        errorDiv.textContent = "";

        // BirthDate validation GG/MM/AAAA
        const dateInput = document.getElementById("birthDateDisplay").value.trim();
        const dateRegex = /^(\d{2})\/(\d{2})\/(\d{4})$/;
        const match = dateInput.match(dateRegex);
        if (!match) {
            errorDiv.textContent = "Formato data non valido. Usa GG/MM/AAAA.";
            return false;
        }

        const day   = parseInt(match[1]);
        const month = parseInt(match[2]);
        const year  = parseInt(match[3]);
        const birthDate = new Date(year, month - 1, day);

        if (birthDate.getFullYear() !== year ||
            birthDate.getMonth() !== month - 1 ||
            birthDate.getDate() !== day) {
            errorDiv.textContent = "Data di nascita non valida.";
            return false;
        }

        const today = new Date();
        const age18 = new Date(birthDate);
        age18.setFullYear(age18.getFullYear() + 18);
        if (age18 > today) {
            errorDiv.textContent = "Devi essere maggiorenne per registrarti.";
            return false;
        }

        // Convertto YYYY-MM-DD (Java compatible)
        const yyyy = year.toString().padStart(4, "0");
        const mm   = month.toString().padStart(2, "0");
        const dd   = day.toString().padStart(2, "0");
        document.getElementById("birthDate").value = yyyy + "-" + mm + "-" + dd;

        // Password validation
        const pwd1 = document.getElementById("password1").value;
        if (pwd1.length < 8) {
            errorDiv.textContent = "La password deve essere lunga almeno 8 caratteri.";
            return false;
        }
        if (!pwd1.includes("id_07")) {
            errorDiv.textContent = "La password deve contenere 'id_07'.";
            return false;
        }

        const pwd2 = document.getElementById("password2").value;
        if (pwd1 !== pwd2) {
            errorDiv.textContent = "Le due password non coincidono.";
            return false;
        }

        return true;
    }
</script>
</body>
</html>
