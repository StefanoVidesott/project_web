<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{bases/head.html}"></head>

<body>
    <nav th:replace="~{bases/navbar.html}"></nav>

    <div class="box m-5 p-5">
        <h1>Inserisci gli esercizi nel tuo nuovo programma!</h1>

        <form th:action="@{/training/custom/save}" class="form" method="post">

            <div class="mb-3">
                <label for="trainingName" class="form-label">Nome programma</label>
                <input type="text" class="form-control" id="trainingName" name="trainingName" placeholder="Workout..." required>
            </div>

            <div id="exerciseList">

                <div class="blocco-esercizi">

                    <label>Nome esercizio</label>
                    <select class="form-select mb-2" aria-label="Default select example" name="exercises[0].exerciseName" required>
                        <option value="" disabled selected>Scegli un esercizio</option>
                        <option th:each="exerciseName : ${exerciseNames}" th:value="${exerciseName}" th:text="${exerciseName}"></option>
                    </select>

                    <label>Numero ripetizioni</label>
                    <input type="number" id="numReps" name="exercises[0].reps" placeholder="Numero ripetizioni..." required>

                    <label>Numero serie</label>
                    <input type="number"  id="numSets" name="exercises[0].sets" placeholder="Numero serie..." required>
                </div>
            </div>

            <br>
            <button type="button" class="btn btn-secondary" onclick="addExercise()">Aggiungi un esercizio</button>
            <button type="submit" class="btn btn-primary">Salva scheda</button>

        </form>
    </div>
    <div class="row mx-5">
        <div class="col-auto">
            <a th:href="@{/dashboard}" class="btn btn-primary">
                Torna alla Dashboard
            </a>
        </div>
    </div>

    <script th:src="@{/js/customTraining.js}"></script>
    <div th:replace="~{bases/footer.html}"></div>
    <div th:replace="~{bases/scripts.html}"></div>
</body>

</html>
