    https://getbootstrap.com/docs/4.0/content/tables/
-->
<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>

    <div class="container p-5">
        <div class="row mb-4">
            <div class="col">
                <h1>Benvenuto/a, <span th:text="${name}"></span>!</h1>
                <p class="text-muted">Pannello di amministrazione</p>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-auto">
                <a th:href="@{/adminListaUtenti}" class="btn btn-primary">
                    Visualizza Lista Utenti
                </a>
            </div>
            <div class="col-auto">
                <form th:action="@{/rimuoviScaduti}" method="post">
                    <button type="submit" class="btn btn-warning">
                        Rimuovi utenti scaduti
                    </button>
                </form>
            </div>
            <div class="col-auto">
                <a th:href="@{/adminStatistiche}" class="btn btn-info">
                    Statistiche
                </a>
            </div>
        </div>

        <div class="alert alert-warning" role="alert" th:if="${removed != null}">
            <p>Utenti rimossi: <strong th:text="${removed}"></strong></p>
        </div>

        <div class="row" th:if="${not#lists.isEmpty(users)}">
            <div class="box p-4">
                <div class="row mb-4">
                    <div class="col">
                        <h2>Lista Utenti</h2>
                    </div>
                </div>
                <div class="col">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Nome</th>
                                <th>Cognome</th>
                                <th>Email</th>
                                <th>Data registrazione</th>
                                <th>Ruolo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.firstName}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.signupDate}"></td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${user.authority}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <div th:replace="~{bases/footer.html}"></div>
    <div th:replace="~{bases/scripts.html}"></div>
</body>
</html>
