<!-- REFERENCES:
    https://getbootstrap.com/docs/4.0/content/tables/
    https://stackoverflow.com/questions/52132580/how-to-format-decimals-in-thymeleaf-without-unnecessary-zeros
-->
<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>

    <div class="container p-5">
        <div class="row mb-4">
            <div class="col">
                <h1>Benvenuto/a, <span th:text="${name}"></span>!</h1>
                <p class="text-muted">Pannello di amministrazione</p>
            </div>
        </div>

        <div class="row mb-5">
            <div class="col-auto">
                <a th:href="@{/admin/users}" class="btn btn-primary">
                    Visualizza Lista Utenti
                </a>
            </div>
            <div class="col-auto">
                <form th:action="@{/admin/remove-expired}" method="post">
                    <button type="submit" class="btn btn-warning">
                        Rimuovi utenti scaduti
                    </button>
                </form>
            </div>
            <div class="col-auto">
                <a th:href="@{/admin/statistics}" class="btn btn-info">
                    Statistiche
                </a>
            </div>
        </div>

        <div class="alert alert-warning" role="alert" th:if="${removed != null}">
            <p>Utenti rimossi: <strong th:text="${removed}"></strong></p>
        </div>

        <div class="row" th:if="${not#lists.isEmpty(users)}">
            <div class="box p-4">
                <div class="row mb-4">
                    <div class="col">
                        <h2>Lista Utenti</h2>
                    </div>
                </div>
                <div class="col">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Nome</th>
                                <th>Cognome</th>
                                <th>Email</th>
                                <th>Data registrazione</th>
                                <th>Ruolo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.username}"></td>
                                <td th:text="${user.firstName}"></td>
                                <td th:text="${user.lastName}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.signupDate}"></td>
                                <td>
                                    <span class="badge bg-primary" th:text="${user.authority}"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="row" th:if="${not #lists.isEmpty(statistics)}">
            <div class="box p-4">
                <div class="row mb-4">
                    <div class="col">
                        <h2>Statistiche Allenamenti</h2>
                        <p class="text-muted">Media allenamenti per programma per utenti Basic e Pro</p>
                    </div>
                </div>
                <div class="col">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Ruolo</th>
                                <th>Full Body</th>
                                <th>Push/Pull/Legs</th>
                                <th>Cardio</th>
                                <th>Strength</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="stat : ${statistics}">
                                <td>
                                    <span class="badge bg-primary" th:text="${stat['AUTHORITY']}"></span>
                                </td>
                                <td th:text="${#numbers.formatDecimal(stat['FULL_BODY'], 1, 2)}"></td>
                                <td th:text="${#numbers.formatDecimal(stat['PUSH_PULL_LEGS'], 1, 2)}"></td>
                                <td th:text="${#numbers.formatDecimal(stat['CARDIO'], 1, 2)}"></td>
                                <td th:text="${#numbers.formatDecimal(stat['STRENGTH'], 1, 2)}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
    <div th:replace="~{bases/footer.html}"></div>
    <div th:replace="~{bases/scripts.html}"></div>
</body>
</html>
