<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{bases/head.html}"></head>
<body>
    <nav th:replace="~{bases/navbar.html}"></nav>
    <h1>Cambio Password</h1>

    <div th:if="${error}" style="color:red">
        <p th:text="${error}"></p>
    </div>
    <div th:if="${success}" style="color:green">
        <p th:text="${success}"></p>
    </div>

    <form th:action="@{/cambioPassword}" method="post" onsubmit="return validateForm()">

        <label>Vecchia password</label><br>
        <input type="password" id="oldPassword" name="oldPassword" required><br><br>

        <label>Nuova password</label><br>
        <input type="password" id="newPassword" name="newPassword" required><br><br>

        <label>Conferma nuova password</label><br>
        <input type="password" id="confirmPassword" name="confirmPassword" required><br><br>

        <div id="errorMsg" style="color:red"></div>

        <button type="submit">Aggiorna Password</button>
    </form>

    <br>
    <a th:href="@{/dashboard}">Torna alla dashboard</a>

    <script>
        function validateForm() {
            const errorDiv = document.getElementById("errorMsg");
            errorDiv.textContent = "";

            const newPwd = document.getElementById("newPassword").value;
            const confirmPwd = document.getElementById("confirmPassword").value;

            if (newPwd.length < 8) {
                errorDiv.textContent = "La password deve essere lunga almeno 8 caratteri.";
                return false;
            }

            if (!newPwd.includes("id_07")) {
                errorDiv.textContent = "La password deve contenere 'id_07'.";
                return false;
            }

            if (newPwd !== confirmPwd) {
                errorDiv.textContent = "Le due password non coincidono.";
                return false;
            }

            return true;
        }
    </script>
    <div th:replace="~{bases/scripts.html}"></div>
</body>
</html>
