<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>FitApp - Login</title></head>
<body>
<h1>Login</h1>
<form th:action="@{/login}" method="post">

    <button type="submit">Accedi</button>
</form>
</body>
</html>
